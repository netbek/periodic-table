default_language_version:
  node: 24.15.0
  python: python3.13

default_stages: [pre-commit]

fail_fast: true

repos:
  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt
        entry: nixfmt
        language: system
        files: \.nix$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        alias: prettier-js
        name: prettier (js)
        args: [--parser, babel, --write]
        files: ^(src)/.*\.(js|jsx|cjs|mjs)$

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py313-plus]

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: [--settings-path, pyproject.toml]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--config, pyproject.toml]
        stages: [manual]

      - id: ruff-format
        args: [--config, pyproject.toml]
